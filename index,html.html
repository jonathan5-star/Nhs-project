<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scientific Calculator</title>
<style>
    body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: #1e1e1e;
        font-family: Arial, sans-serif;
    }

    .calculator {
        background: #2c2c2c;
        padding: 20px;
        border-radius: 10px;
        width: 320px;
    }

    #display {
        width: 100%;
        height: 60px;
        font-size: 24px;
        margin-bottom: 10px;
        text-align: right;
        padding: 10px;
        border: none;
        border-radius: 5px;
    }

    .buttons {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 8px;
    }

    button {
        padding: 15px;
        font-size: 16px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        background: #444;
        color: white;
    }

    button:hover {
        background: #666;
    }

    .operator {
        background: #ff9500;
    }

    .equal {
        background: #28a745;
        grid-column: span 2;
    }

    .clear {
        background: #dc3545;
    }
</style>
</head>
<body>

<div class="calculator">
    <input type="text" id="display" disabled>

    <div class="buttons">
        <button onclick="clearDisplay()" class="clear">C</button>
        <button onclick="backspace()" class="clear">←</button>
        <button onclick="append('(')">(</button>
        <button onclick="append(')')">)</button>
        <button onclick="append('%')">%</button>
        <button onclick="append('/')">÷</button>

        <button onclick="append('7')">7</button>
        <button onclick="append('8')">8</button>
        <button onclick="append('9')">9</button>
        <button onclick="append('*')">×</button>
        <button onclick="append('Math.sqrt(')">√</button>

        <button onclick="append('4')">4</button>
        <button onclick="append('5')">5</button>
        <button onclick="append('6')">6</button>
        <button onclick="append('-')">−</button>
        <button onclick="append('Math.pow(')">xʸ</button>
        <button onclick="insertFact()">n!</button>

        <button onclick="append('1')">1</button>
        <button onclick="append('2')">2</button>
        <button onclick="append('3')">3</button>
        <button onclick="append('+')">+</button>
        <button onclick="append('Math.log(')">log</button>

        <button onclick="append('0')">0</button>
        <button onclick="append('.')">.</button>
        <button onclick="append('Math.sin(')">sin</button>
        <button onclick="append('Math.cos(')">cos</button>
        <button onclick="append('Math.tan(')">tan</button>

        <button onclick="append('Math.PI')">π</button>
        <button onclick="append('Math.E')">e</button>
        <button onclick="calculate()" class="equal">=</button>
    </div>
</div>

<script>
    const display = document.getElementById("display");

    function append(value) {
        if (display.value === "Error") display.value = "";
        display.value += value;
    }

    function clearDisplay() {
        display.value = "";
    }

    function backspace() {
        display.value = display.value.slice(0, -1);
    }

    function formatExpression(expr) {
        return expr
            .replace(/×/g, "*")
            .replace(/÷/g, "/")
            .replace(/\bπ\b/g, "Math.PI")
            .replace(/\be\b/g, "Math.E")
            .replace(/%/g, "/100");
    }

    function calculate() {
        const raw = display.value;
        if (!raw) return;

        try {
            const expression = formatExpression(raw);
            // eslint-disable-next-line no-new-func
            const result = Function("Math", `return ${expression}`)(Math);
            display.value = (typeof result === 'number' && !Number.isFinite(result)) ? 'Error' : String(result);
        } catch (err) {
            console.error(err);
            display.value = "Error";
        }
    }

    function insertFact() {
        const x = parseFloat(display.value);
        if (Number.isNaN(x) || x < 0) {
            display.value = "Error";
            return;
        }
        let fact = 1;
        for (let i = 1; i <= x; i++) fact *= i;
        display.value = String(fact);
    }
</script>

</body>
</html>
